<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank - Crédito Eventos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
    background-color: #eef2f3;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    width: 350px;
    text-align: center;
}

.form-group {
    text-align: left;
    margin-bottom: 15px;
}

label { font-size: 14px; color: #555; display: block; margin-bottom: 5px; }

select, input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { background-color: #333; }

.resultado-container {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 2px dashed #eee;
    text-align: left;
    display: none;
}

.res-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 15px;
}

.total {
    font-weight: bold;
    color: #27ae60;
    font-size: 18px;
    margin-top: 10px;
}
    </style>
</head>
<body>

    <div class="card">
        <h2>Crédito para Eventos</h2>
        <p>Planeje seu evento corporativo com o Infinity Bank</p>

        <div class="form-group">
            <label>Selecione o Pacote:</label>
            <select id="pacote">
                <option value="50">Standard (R$ 50,00/pessoa)</option>
                <option value="80">Premium (R$ 80,00/pessoa)</option>
                <option value="120">Infinity Deluxe (R$ 120,00/pessoa)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantidade de Pessoas:</label>
            <input type="number" id="quantidade" min="1" placeholder="Ex: 50">
        </div>

        <button onclick="calcularOrcamento()">Calcular Orçamento</button>

        <div id="resultado" class="resultado-container">
     
        </div>
    </div>

    <script src="script.js">
        function calcularOrcamento() {
    const valorPacote = parseFloat(document.getElementById('pacote').value);
    const qtdPessoas = parseInt(document.getElementById('quantidade').value);
    const painelResultado = document.getElementById('resultado');

    
    if (isNaN(qtdPessoas) || qtdPessoas <= 0) {
        alert("Por favor, insira uma quantidade válida de pessoas.");
        return;
    }

 
    const custoBruto = valorPacote * qtdPessoas;
    const taxaServico = custoBruto * 0.10; 
    
   
    let desconto = 0;
    if (qtdPessoas > 100) {
        desconto = custoBruto * 0.05;
    }

    const totalFinal = custoBruto + taxaServico - desconto;


    painelResultado.style.display = 'block';
    painelResultado.innerHTML = `
        <div class="res-item"><span>Custo Bruto:</span> <span>${formatarMoeda(custoBruto)}</span></div>
        <div class="res-item"><span>Taxa de Serviço (10%):</span> <span>${formatarMoeda(taxaServico)}</span></div>
        <div class="res-item"><span>Desconto:</span> <span>- ${formatarMoeda(desconto)}</span></div>
        <div class="res-item total"><span>Total Final:</span> <span>${formatarMoeda(totalFinal)}</span></div>
    `;
}


function formatarMoeda(valor) {
    return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
    </script>
</body>
</html>
