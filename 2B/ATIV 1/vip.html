<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Bank - Convidados VIP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
    background-color: #f4f7f6;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    width: 400px;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    text-align: center;
}

h2 { margin: 0; color: #1a1a1a; }
p { color: #666; margin-bottom: 1.5rem; }

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
}

input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
}

button#addBtn {
    background-color: #000;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    text-align: left;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #eee; 
}

li:last-child { border-bottom: none; }

.guest-name { flex: 1; }


.completed {
    text-decoration: line-through;
    color: #888;
}

.actions {
    display: flex;
    gap: 5px;
}

.actions button {
    font-size: 12px;
    padding: 5px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
}

.btn-done { background: #d4edda; color: #155724; }
.btn-edit { background: #fff3cd; color: #856404; }
.btn-delete { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Infinity Bank</h2>
        <p>Lista de Convidados VIP</p>

        <div class="input-group">
            <input type="text" id="guestInput" placeholder="Nome do convidado...">
            <button id="addBtn">Adicionar</button>
        </div>

        <ul id="guestList">
        </ul>
    </div>

    <script src="script.js">
        const guestInput = document.getElementById('guestInput');
const addBtn = document.getElementById('addBtn');
const guestList = document.getElementById('guestList');

addBtn.addEventListener('click', addGuest);

guestInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addGuest();
});

function addGuest() {
    const name = guestInput.value.trim();

    if (name === "") {
        alert("Por favor, digite um nome válido.");
        return;
    }

    const li = document.createElement('li');

    li.innerHTML = `
        <span class="guest-name">${name}</span>
        <div class="actions">
            <button class="btn-done">Concluir</button>
            <button class="btn-edit">Editar</button>
            <button class="btn-delete">Excluir</button>
        </div>
    `;


    li.querySelector('.btn-done').addEventListener('click', () => {
        li.querySelector('.guest-name').classList.toggle('completed');
    });


    li.querySelector('.btn-edit').addEventListener('click', () => {
        const span = li.querySelector('.guest-name');
        const newName = prompt("Editar nome do convidado:", span.innerText);
        if (newName && newName.trim() !== "") {
            span.innerText = newName.trim();
        }
    });

    li.querySelector('.btn-delete').addEventListener('click', () => {
        if (confirm("Remover convidado da lista?")) {
            li.remove();
        }
    });

    guestList.appendChild(li);
    guestInput.value = "";
    guestInput.focus();
}
    </script>
</body>
</html>
